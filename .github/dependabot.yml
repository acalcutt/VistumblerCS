version: 2
updates:
  # Keep NuGet packages up to date
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      # Bundle all Microsoft.* packages into one PR
      microsoft:
        patterns:
          - "Microsoft.*"
      # Bundle all System.* packages into one PR
      system:
        patterns:
          - "System.*"

  # Keep GitHub Actions up to date
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
