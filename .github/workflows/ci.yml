name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            rid: win-x64
          - arch: arm64
            runner: windows-11-arm
            rid: win-arm64

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore VistumblerCS.sln

      - name: Build
        run: dotnet build VistumblerCS.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VistumblerCS.sln --configuration Release --no-build --verbosity normal

      - name: Publish (${{ matrix.arch }})
        run: |
          dotnet publish Vistumbler.UI/Vistumbler.UI.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            --output ./publish/${{ matrix.arch }}

      - name: Upload CI build artifact
        uses: actions/upload-artifact@v7
        with:
          name: VistumblerCS-ci-${{ matrix.arch }}-${{ github.sha }}
          path: ./publish/${{ matrix.arch }}/
          retention-days: 7
