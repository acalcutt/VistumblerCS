name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore VistumblerCS.sln

      - name: Build
        run: dotnet build VistumblerCS.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test VistumblerCS.sln --configuration Release --no-build --verbosity normal
