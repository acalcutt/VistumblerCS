name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  release-check:
    name: Check if version is already released
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Get version and check GitHub releases
        id: check
        run: |
          VERSION=$(grep -oP '<Version>\K[^<]+' Vistumbler.UI/Vistumbler.UI.csproj | head -1)

          if echo "$VERSION" | grep -qP '\-(alpha|beta|rc)\.\d+'; then
            RELEASE_TYPE="prerelease"
          else
            RELEASE_TYPE="regular"
          fi

          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}")

          if [ "$HTTP_STATUS" = "200" ]; then
            PUBLISHED="true"
          else
            PUBLISHED="false"
          fi

          echo "version=$VERSION"        >> "$GITHUB_OUTPUT"
          echo "published=$PUBLISHED"    >> "$GITHUB_OUTPUT"
          echo "release_type=$RELEASE_TYPE" >> "$GITHUB_OUTPUT"
          echo "VERSION: $VERSION"
          echo "RELEASE_TYPE: $RELEASE_TYPE"
          echo "PUBLISHED: $PUBLISHED"

    outputs:
      published:    ${{ steps.check.outputs.published }}
      version:      ${{ steps.check.outputs.version }}
      release_type: ${{ steps.check.outputs.release_type }}

  build:
    name: Build Windows release (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    needs: release-check
    if: ${{ needs.release-check.outputs.published == 'false' }}
    environment: release
    strategy:
      matrix:
        include:
          - arch: x64
            runner: windows-latest
            rid: win-x64
          - arch: arm64
            runner: windows-11-arm
            rid: win-arm64

    steps:
      - uses: actions/checkout@v7

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore VistumblerCS.sln

      - name: Publish self-contained single-file exe (${{ matrix.arch }})
        run: |
          dotnet publish Vistumbler.UI/Vistumbler.UI.csproj `
            --configuration Release `
            --runtime ${{ matrix.rid }} `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:PublishReadyToRun=true `
            --output ./publish/${{ matrix.arch }}

      - name: Sign published executables
        shell: pwsh
        env:
          SIG_PFX: ${{ secrets.SIG_PFX }}
          SIG_PFX_PASS: ${{ secrets.SIG_PFX_PASS }}
        run: |
          if (-not $env:SIG_PFX) {
            Write-Warning "No SIG_PFX secret found, skipping signing."
            exit 0
          }

          # Decode PFX from base64 secret
          $pfxPath = Join-Path $PWD 'cert.pfx'
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:SIG_PFX))

          # Find signtool.exe inside Windows Kits
          $signtoolPath = ""
          $programFiles = ${env:ProgramFiles(x86)}
          if (-not $programFiles) { $programFiles = $env:ProgramFiles }

          $candidates = Get-ChildItem -Path "$programFiles\Windows Kits" -Include signtool.exe -Recurse -ErrorAction SilentlyContinue
          if ($candidates) {
            $arch = "${{ matrix.arch }}"
            $best = $null
            if ($arch -eq 'arm64') {
              # Prefer native arm64 signtool when running on arm64 runner
              $best = $candidates | Where-Object { $_.FullName -match '\\arm64\\' } | Select-Object -First 1
            }
            if (-not $best) {
              $best = $candidates | Where-Object { $_.FullName -match '\\x64\\' } | Select-Object -First 1
            }
            if (-not $best) {
              $best = $candidates | Where-Object { $_.FullName -match '\\x86\\' } | Select-Object -First 1
            }
            if (-not $best) {
              $best = $candidates | Where-Object { $_.FullName -notmatch '\\arm' } | Select-Object -First 1
            }
            if (-not $best) { $best = $candidates | Select-Object -First 1 }
            if ($best) { $signtoolPath = $best.FullName }
          }

          if (-not $signtoolPath) {
            $cmd = Get-Command signtool.exe -ErrorAction SilentlyContinue
            if ($cmd) { $signtoolPath = $cmd.Path }
          }

          if (-not $signtoolPath) {
            Write-Warning "signtool.exe not found, skipping signing"
            Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue
            exit 0
          }
          Write-Host "Using signtool: $signtoolPath"

          # Sign every executable in the publish folder
          $targets = Get-ChildItem -Path "./publish/${{ matrix.arch }}" -Recurse -Include *.exe -ErrorAction SilentlyContinue
          if (-not $targets) {
            Write-Warning "No executables found under ./publish/${{ matrix.arch }} to sign"
            Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue
            exit 0
          }

          foreach ($exe in $targets) {
            Write-Host "Signing $($exe.FullName)"
            & $signtoolPath sign /f $pfxPath /p $env:SIG_PFX_PASS /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $exe.FullName
            if ($LASTEXITCODE -ne 0) {
              Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue
              throw "signtool failed for $($exe.FullName) (exit $LASTEXITCODE)"
            }
          }

          Remove-Item -Path $pfxPath -Force -ErrorAction SilentlyContinue

      - name: Package release artifact
        shell: pwsh
        run: |
          $version = "${{ needs.release-check.outputs.version }}"
          Compress-Archive `
            -Path "./publish/${{ matrix.arch }}/*" `
            -DestinationPath "./Vistumbler-v${version}-win-${{ matrix.arch }}.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-artifact-${{ matrix.arch }}
          path: Vistumbler-v${{ needs.release-check.outputs.version }}-win-${{ matrix.arch }}.zip
          retention-days: 7

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [release-check, build]
    if: ${{ needs.release-check.outputs.published == 'false' }}
    environment: release

    steps:
      - uses: actions/checkout@v7

      - name: Download build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-artifact-*
          path: ./artifacts
          merge-multiple: true

      - name: Extract changelog for version
        run: |
          VERSION="${{ needs.release-check.outputs.version }}"
          awk -v ver="## $VERSION" \
            'BEGIN{p=0} $0==ver{p=1; next} /^## / && p==1{exit} p==1{print}' \
            CHANGELOG.md > changelog_for_version.md
          echo "--- Release notes ---"
          cat changelog_for_version.md

      - name: Determine release flags
        id: flags
        run: |
          if [[ "${{ needs.release-check.outputs.release_type }}" == 'regular' ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true"  >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag:        v${{ needs.release-check.outputs.version }}
          name:       v${{ needs.release-check.outputs.version }}
          bodyFile:   changelog_for_version.md
          artifacts:  ./artifacts/Vistumbler-v${{ needs.release-check.outputs.version }}-win-x64.zip,./artifacts/Vistumbler-v${{ needs.release-check.outputs.version }}-win-arm64.zip
          prerelease: ${{ steps.flags.outputs.prerelease }}
          allowUpdates: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
